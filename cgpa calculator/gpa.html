<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA & CGPA Calculator</title>
    <link rel="stylesheet" href="gpa.css">
</head>
<body>

<div class="container">

    <h1>🎓 GPA & CGPA Calculator</h1>


    <div class="cgpa-card">
        <h2>Current CGPA</h2>
        <p id="cgpa">0.00</p>
    </div>

    <!-- Semester -->
    <div class="semester-section">
        <label>Select Semester</label>

        <select id="semester">
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
            <option value="5">Semester 5</option>
            <option value="6">Semester 6</option>
            <option value="7">Semester 7</option>
            <option value="8">Semester 8</option>
        </select>
    </div>
    <div class="stats">
        <div class="stat-card">
            <h3>Total Credits</h3>
            <p id="totalCredits">0</p>
        </div>

        <div class="stat-card">
            <h3>Total Subjects</h3>
            <p id="totalSubjects">0</p>
        </div>
    </div>

    <div class="card">

        <h2>Previous Semester GPA</h2>

        <div class="form-group">
            <label>Total Credits</label>

            <input
                type="number"
                id="manualCredits"
                min="1"
                placeholder="Example : 22">
        </div>

        <div class="form-group">
            <label>Select Semester</label>

            <select id="manualSemester">
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>
        </div>

        <div class="form-group">
            <label>Semester GPA</label>

            <input
                type="number"
                id="manualGPA"
                step="0.01"
                min="0"
                max="10"
                placeholder="Example: 8.75">
        </div>

        <button id="saveManualBtn">
            Save GPA
        </button>

    </div>

    <!-- Add Subject -->
    <div class="card">

        <h2>Add Subject</h2>

        <div class="form-group">
            <label>Subject Name</label>
            <input
                type="text"
                id="subjectName"
                placeholder="Enter Subject Name">
        </div>

        <div class="form-group">
            <label>Credits</label>
            <input
                type="number"
                id="credits"
                min="1"
                placeholder="Credits">
        </div>

        <div class="form-group">
            <label>Grade</label>

        <select id="grade">
            <option value="">Select Grade</option>
            <option value="S">S</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
        </select>        
    </div>

        <button id="addBtn">Add Subject</button>

    </div>



    <div class="card">

        <h2>Subjects</h2>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Subject</th>
                <th>Credits</th>
                <th>Grade</th>
                <th>Grade Point</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="tableBody">

            <!-- JavaScript Rows -->

            </tbody>

        </table>

    </div>

    <!-- GPA -->

    <div class="gpa-card">

        <h2>Semester GPA</h2>

        <p id="gpa">0.00</p>

    </div>

    <!-- What If Mode -->

    <div class="card">

        <h2>What-if Mode</h2>

        <div class="form-group">

            <label>Future Semester</label>

            <select id="futureSemester">
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
            </select>

        </div>

        <div class="form-group">

            <label>Expected GPA</label>

            <input
                type="number"
                id="futureGpa"
                step="0.01"
                placeholder="Example : 9.5">

        </div>

        <button id="simulateBtn">
            Simulate
        </button>

        <h3>Projected CGPA</h3>

        <p id="projectedCgpa">
            0.00
        </p>

    </div>

</div>

<script src="gpa.js"></script>

</body>
</html>
